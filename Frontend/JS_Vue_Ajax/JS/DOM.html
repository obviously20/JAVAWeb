<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM:文档对象模型</title>
</head>
<body>
  <!-- 那么我们学习DOM技术有什么用呢？主要作用如下：
- 改变 HTML 元素的内容
- 改变 HTML 元素的样式（CSS）
- 对 HTML DOM 事件作出反应
- 添加和删除 HTML 元素 -->

  <h1 id="title">DOM:文档对象模型1</h1>
  <h1 id="title2">DOM:文档对象模型2</h1>
  <h1 id="title3">DOM:文档对象模型3</h1>

  <script>
    //如何通过DOM来操作HTML
    //1.获取元素
    //- 我们可以通过如下两种方式来获取DOM元素。
    // 1. 根据CSS选择器来获取DOM元素，获取到匹配到的第一个元素：document.querySelector('CSS选择器');
    // 2. 根据CSS选择器来获取DOM元素，获取匹配到的所有元素：document.querySelectorAll('CSS选择器');
        //注意：获取到的所有元素，会封装到一个NodeList节点集合中，是一个伪数组（有长度、有索引的数组，但没有push、pop等数组方法）

    let title = document.querySelector('#title');
    let title2 = document.querySelectorAll('h1');
    //2. 修改元素内容 
    // xxx.innerHTML = '新的内容';
    title.innerHTML = '这是通过DOM修改的内容';
    title2[1].innerHTML = '这是通过DOM修改的内容title2';

  </script>


</body>
</html>
