<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tlias智能学习辅助系统</title>
    <style>
      body {
        margin: 0;
      }

      /* 顶栏样式 */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #c2c0c0;
        padding: 20px 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }
      
      /* 加大加粗标题 */
      .header h1 {
        margin: 0;
        font-size: 24px;
        font-weight: bold;
      }

      /* 文本链接样式 */
      .header a {
        text-decoration: none;
        color: #333;
        font-size: 16px;
      }

      /* 搜索表单区域 */
      .search-form {
        display: flex;
        align-items: center;
        padding: 20px;
        background-color: #f9f9f9;
      }

      /* 表单控件样式 */
      .search-form input[type="text"], .search-form select {
        margin-right: 10px;
        padding: 10px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 26%;
      }

      /* 按钮样式 */
      .search-form button {
        padding: 10px 15px;
        margin-left: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      /* 清空按钮样式 */
      .search-form button.clear {
        background-color: #6c757d;
      }

      .table {
         min-width: 100%; 
         border-collapse: collapse;
      }

      /* 设置表格单元格边框 */
      .table td, .table th { 
        border: 1px solid #ddd; 
        padding: 8px; 
        text-align: center;
      }
      
      .avatar { 
        width: 30px; 
        height: 30px; 
        object-fit: cover; 
        border-radius: 50%; 
      }

      /* 页脚版权区域 */
    .footer {
        background-color: #c2c0c0;
        color: white;
        text-align: center;
        padding: 10px 0;
        margin-top: 30px;
    }

    .footer .company-name {
        font-size: 1.1em;
        font-weight: bold;
    }

    .footer .copyright {
        font-size: 0.9em;
    }

    #container {
      width: 80%;
      margin: 0 auto;
    }
    </style>
</head>
<body>
    
  <div id="container">
    <!-- 顶栏 -->
    <div class="header">
      <h1>Tlias智能学习辅助系统</h1>
      <a href="#">退出登录</a>
    </div>

    <!-- 搜索表单区域 -->
    <form class="search-form" action="#" method="post">
      <!-- v-model:绑定表单数据:双向数据绑定 -->
      <input type="text" v-model="searchEmp.name" placeholder="姓名" />
      <select v-model="searchEmp.gender">
          <option value="">性别</option>
          <option value="1">男</option>
          <option value="2">女</option>
      </select>
      <select v-model="searchEmp.job">
          <option value="">职位</option>
          <option value="1">班主任</option>
          <option value="2">讲师</option>
          <option value="3">学工主管</option>
          <option value="4">教研主管</option>
          <option value="5">咨询师</option>
      </select>
      <!-- v-on:绑定事件:单向事件绑定 -->
      <!-- 两种格式：v-on:事件="方法"/@事件="方法" -->
      <button type="button" @click="search">查询</button>
      <button type="button"  v-on:click="clear">清空</button>
    </form>
    {{searchEmp}} <!-- 通过插值表达式来查看v-model绑定的数据 -->
    <table class="table table-striped table-bordered">
      <thead>
          <tr>
              <th>ID</th>
              <th>姓名</th>
              <th>性别</th>
              <th>头像</th>
              <th>职位</th>
              <th>入职日期</th>
              <th>最后操作时间</th>
              <th>操作</th>
          </tr>
      </thead>
      <tbody>
        <!-- 要想那个标签执行多次那就将v-for加载到这个标签里面 -->
        <tr v-for="(e, index) in empList" :key="e.id">
          <td>{{e.id}}</td>
          <td>{{e.name}}</td>
          <td>{{e.gender==1?"男":"女"}}</td>
          <!-- 插值表达式不能出现在标签内部（v-bind的应用场景） -->
          <!-- <td><img src="{{e.image}}" alt="{{e.name}}" class="avatar"></td> -->
          <!-- 所以用（完整）v-bind:属性="变量"/（简写）:属性="变量"的方式动态绑定属性值 -->
          <td><img v-bind:src="e.image" :alt="e.name" class="avatar"></td>
          <!-- 一般用三元运算符来判断职位 -->
          <!-- <td>{{e.job==1?"班主任":(e.job==2?"讲师":(e.job==3?"学工主管":(e.job==4?"教研主管":(e.job==5?"咨询师":"其他"))))}}</td> -->
  
          <!-- 是否显示 -->
          <!-- 还可以用v-if/v-show 来判断职位 -->

  
          <!-- v-if:true表示显示，v-if:false表示不显示 -->
          <!-- 其底层是true/false，如果为true则显示(且渲染到页面)，为false则不显示（不渲染到页面） -->
          <td>
            <span v-if="e.job==1">班主任</span>
            <span v-else-if="e.job==2">讲师</span>
            <span v-else-if="e.job==3">学工主管</span>
            <span v-else-if="e.job==4">教研主管</span>
            <span v-else-if="e.job==5">咨询师</span>
            <span v-else>其他</span>
          </td>


          <!-- v-show ：true表示显示，false表示不显示 (渲染到页面)) -->
          <!-- 其底层是true/false，不过不管显示与否，都会渲染到页面,只是控制CSS的display属性none/block -->  
          <!-- <td>
            <span v-show="e.job==1">班主任</span>
            <span v-show="e.job==2">讲师</span>
            <span v-show="e.job==3">学工主管</span>
            <span v-show="e.job==4">教研主管</span>
            <span v-show="e.job==5">咨询师</span>
          </td> -->


          <td>{{e.entrydate}}</td>
          <td>{{e.updatetime}}</td>
           <td class="btn-group">
            <button class="edit">编辑</button>
            <button class="delete">删除</button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- 页脚版权区域 -->
    <footer class="footer">
      <p class="company-name">江苏传智播客教育科技股份有限公司</p>
      <p class="copyright">版权所有 Copyright 2006-2024 All Rights Reserved</p>
    </footer>

    <script type="module" >
      import { createApp } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
      createApp({
        data() {
          return {
            searchEmp:{
              name: "",
              gender: "",
              job: ""
            },
            empList: [
              { "id": 1,
                "name": "谢逊",
                "image": "https://web-framework.oss-cn-hangzhou.aliyuncs.com/2023/4.jpg",
                "gender": 1,
                "job": "1",
                "entrydate": "2023-06-09",
                "updatetime": "2024-07-30T14:59:38"
              },
              {
                "id": 2,
                "name": "韦一笑",
                "image": "https://web-framework.oss-cn-hangzhou.aliyuncs.com/2023/1.jpg",
                "gender": 1,
                "job": "1",
                "entrydate": "2020-05-09",
                "updatetime": "2023-07-01T00:00:00"
              },
              {
                "id": 3,
                "name": "黛绮丝",
                "image": "https://web-framework.oss-cn-hangzhou.aliyuncs.com/2023/2.jpg",
                "gender": 2,
                "job": "2",
                "entrydate": "2021-06-01",
                "updatetime": "2023-07-01T00:00:00"
              }
            ]
          }
        },
        methods: {
          search() {
            console.log(this.searchEmp)
          },
          clear() {
            this.searchEmp = {name:"",gender:"",job:""}
          }
        }
      }).mount('#container')
    </script>

  </div>

</body>
</html>
