<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 1. 全局字体和背景优化 */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f7fa;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    /* 2. 表格整体样式 */
    table {
      border-collapse: collapse; /* 合并边框，避免双线 */
      width: 800px;              /* 固定宽度或设为 100% */
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* 添加阴影增加立体感 */
      border-radius: 8px;        /* 圆角 */
      overflow: hidden;          /* 确保圆角生效 */
    }

    /* 3. 表头样式 */
    thead tr {
      background-color: #009879; /* 清新的绿色主题，也可改为 #4CAF50 或 #333 */
      color: #ffffff;
      text-align: left;
    }

    th, td {
      padding: 12px 15px;        /* 增加内边距，让内容不拥挤 */
      border-bottom: 1px solid #dddddd;
    }

    /* 4. 行悬停效果 */
    tbody tr:hover {
      background-color: #f1f1f1;
      transition: background-color 0.2s ease;
    }

    /* 5. 最后一行去掉底部边框 */
    tbody tr:last-of-type {
      border-bottom: 2px solid #009879;
    }

    /* 6. 音频控制器样式微调 */
    audio {
      height: 30px;              /* 限制高度，保持表格整齐 */
      width: 200px;              /* 固定宽度，防止表格列宽跳动 */
      outline: none;
    }
    
    /* 修正第一行歌手名字的错误（可选，建议在HTML中直接修改） */
    /* 如果无法修改HTML，可以用CSS隐藏或替换，但最好直接改HTML为 "覃沐曦" */
  </style>
</head>

<body>
  <table>
    <thead>
      <tr>
        <th>编号</th>
        <th>标题</th>
        <th>歌手</th>
        <th>时长</th>
        <th>播放</th>
      </tr>
    </thead>

    <tbody>
      <!-- 1        唐人                        覃沐曦         03:44        
  2        漂洋过海来看你         周深            03:03        
  3        小幸运                     田馥甄         04:17        
  4        Excitant                   成驰洋         03:30         -->
      <tr>
        <td>1</td>
        <td>唐人</td>
        <td>姓名</td>
        <td>03:44</td>
        <td><audio src="./mp3/mp3/唐人.mp3" controls class="audios"></audio></td>
      </tr>
      <tr>
        <td>2</td>
        <td>漂洋过海来看你</td>
        <td>周深</td>
        <td>03:04</td>
        <td><audio src="./mp3/mp3/漂洋过海来看你.mp3" controls class="audios"></audio></td>
      </tr>
      <tr>
        <td>3</td>
        <td>小幸运</td>
        <td>田馥甄</td>
        <td>04:17</td>
        <td><audio src="./mp3/mp3/小幸运.mp3" controls class="audios"></audio></td>
      </tr>

      <tr>
        <td>4</td>
        <td>Excitant</td>
        <td>成驰洋</td>
        <td>03:30</td>
        <!-- controls: 音频控制器 -->
        <td><audio src="./mp3/mp3/Excitant.mp3" controls class="audios"></audio></td>
      </tr>
    </tbody>
  </table>
</body>

</html>
